services:

  # ── Spring Boot API ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./server/logistica-urbana
      dockerfile: Dockerfile
    container_name: logistica-backend
    restart: unless-stopped
    ports:
      - "8080:8080"        # acceso directo al API (opcional, quitar en prod)
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      SERVER_PORT: 8080
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      OSRM_URL: ${OSRM_URL:-http://198.199.123.4:5000}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── React + Nginx ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./client/logistica-rutas
      dockerfile: Dockerfile
    container_name: logistica-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
