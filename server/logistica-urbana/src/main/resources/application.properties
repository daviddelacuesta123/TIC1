spring.application.name=logistica-urbana

# Base De Datos

spring.datasource.url=jdbc:postgresql://157.230.82.59:5432/logistica_urbana
spring.datasource.username=logistica
spring.datasource.password=logistica
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — validate: Flyway gestiona el schema; Hibernate solo verifica que coincide

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway — migraciones en src/main/resources/db/migration

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Server

server.port=8080

# JWT

security.jwt.secret=logistica_urbana_jwt_secret_key_2026_segura_256bits_para_hs256
security.jwt.expiration=86400000