spring.application.name=logistica-urbana

# Carga el archivo .env local si existe (no se commitea)
spring.config.import=optional:file:.env[.properties]

# Base De Datos

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — validate: Flyway gestiona el schema; Hibernate solo verifica que coincide

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway — migraciones en src/main/resources/db/migration

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Server

server.port=${SERVER_PORT:8080}

# JWT

security.jwt.secret=${JWT_SECRET}
security.jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# CORS

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}